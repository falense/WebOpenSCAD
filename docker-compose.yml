services:
  # Development server with hot reload: docker compose up web
  web:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development

  # Production build served by nginx: docker compose --profile prod up prod
  prod:
    build:
      context: .
      target: prod
    profiles: ["prod"]
    ports:
      - "8080:80"

volumes:
  node_modules:
